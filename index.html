<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Qargo IQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Qargo palette — dark grey chrome + bright Qargo green as the sole accent. */
      --brand-950: #0A0B0D;
      --brand-900: #17181B;   /* primary dark surface (sidebar, headings, brand mark) */
      --brand-800: #23252A;
      --brand-700: #3A3D44;   /* tertiary dark grey — small text, subtle labels */
      --brand-600: #00E85B;   /* QARGO GREEN — primary action, progress, accent */
      --brand-500: #00C44C;   /* darker green — button hover */
      --brand-100: #BDF8D0;   /* soft green chip bg */
      --brand-50:  #EBFDF1;   /* barely-there green tint */

      --ink-900: #17181B;
      --ink-700: #3A3D44;
      --ink-500: #6B7076;
      --ink-300: #A3A7AD;
      --ink-100: #DDE0E4;

      --surface:   #FFFFFF;
      --surface-2: #F7F7F8;
      --border:    #E5E7EB;

      --good:   #10B981;
      --bad:    #E04D4D;
      --yellow: #FFC43D;

      --radius: 14px;
      --radius-lg: 20px;

      /* Alias kept for back-compat — same as --brand-600. */
      --accent-lime: #00E85B;
      --accent-lime-soft: rgba(0, 232, 91, 0.20);

      --header-h: 68px;
      --shadow-sm: 0 1px 2px rgba(10,11,13,.04), 0 1px 1px rgba(10,11,13,.03);
      --shadow-md: 0 6px 18px rgba(10,11,13,.08);
      --shadow-lg: 0 18px 48px rgba(10,11,13,.14);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--surface-2); color: var(--ink-900); }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      line-height: 1.55;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    /* Links stay readable dark grey, with a Qargo-green underline on hover. */
    a { color: var(--brand-900); text-decoration: none; }
    a:hover {
      text-decoration: underline;
      text-decoration-color: var(--brand-600);
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
    }

    /* Header */
    header {
      padding: 14px 32px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 24px;
      position: sticky; top: 0;
      background: rgba(255,255,255,.9);
      backdrop-filter: saturate(180%) blur(10px);
      z-index: 10;
    }
    header .brand {
      display: flex; align-items: center; gap: 12px;
      font-weight: 700; color: var(--brand-900);
      letter-spacing: -0.01em; font-size: 18px;
    }
    header .brand:hover { text-decoration: none; }
    header .brand .mark {
      width: 36px; height: 36px; border-radius: 10px;
      background: transparent;
      display: grid; place-items: center;
    }
    header .brand .mark img {
      width: 36px; height: 36px;
      object-fit: contain;
      display: block;
    }
    header .brand .sub { color: var(--ink-500); font-weight: 500; }
    header .spacer { flex: 1; }
    header .crumbs { color: var(--ink-500); font-size: 14px; }
    header .crumbs a { color: inherit; }

    /* Center search bar */
    header .search {
      flex: 0 1 420px;
      position: relative;
      display: flex; align-items: center;
    }
    header .search svg.search-icon {
      position: absolute; left: 16px; width: 16px; height: 16px;
      color: var(--ink-500);
      pointer-events: none;
    }
    header .search input {
      width: 100%;
      padding: 11px 16px 11px 42px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      font: inherit; font-size: 14px;
      color: var(--ink-900);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      box-shadow: var(--shadow-sm);
    }
    header .search input:focus {
      border-color: var(--brand-600);
      box-shadow: 0 0 0 4px rgba(0,232,91,.18);
    }
    header .search input::placeholder { color: var(--ink-500); }

    /* Notification bell */
    header .notif {
      position: relative;
      width: 40px; height: 40px;
      display: grid; place-items: center;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      color: var(--ink-700);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
    }
    header .notif svg { width: 18px; height: 18px; }
    header .notif::after {
      content: "";
      position: absolute; top: 9px; right: 9px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--brand-600);
      box-shadow: 0 0 0 2px var(--surface);
    }

    main { max-width: 1200px; margin: 0 auto; padding: 40px 32px 80px; }
    main.course-view { max-width: none; margin: 0; padding: 0; }
    main.home-view { max-width: none; margin: 0; padding: 0 0 80px; }
    main.home-view .home-content {
      max-width: 1200px; margin: 0 auto; padding: 48px 32px 0;
    }
    @media (max-width: 640px) {
      main.home-view .home-content { padding: 32px 20px 0; }
    }
    body.in-course header .search,
    body.in-course header .notif { display: none; }

    /* ------------------------------------------------------------------ */
    /* Course view — Immersive newspaper feel                             */
    /* Full-bleed main column, sidebar becomes a collapsible drawer       */
    /* toggled from a floating pin at the bottom-left.                    */
    /* ------------------------------------------------------------------ */
    .course-layout {
      display: block;
      position: relative;
      min-height: calc(100vh - var(--header-h));
    }
    .course-sidebar {
      background: var(--brand-900);
      color: #fff;
      padding: 64px 28px 40px;
      position: fixed;
      top: var(--header-h);
      left: 0;
      width: 340px;
      height: calc(100vh - var(--header-h));
      overflow-y: auto;
      border-right: 1px solid #0A1E3A;
      transform: translateX(-100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      z-index: 45;
      box-shadow: 0 0 32px rgba(5,13,26,.2);
    }
    .course-sidebar[aria-hidden="false"] { transform: translateX(0); }
    .course-sidebar-backdrop {
      position: fixed;
      inset: var(--header-h) 0 0 0;
      background: rgba(5,13,26,.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
      z-index: 40;
    }
    .course-sidebar-backdrop.visible { opacity: 1; pointer-events: auto; }
    .course-sidebar-close {
      position: absolute;
      top: 16px; right: 16px;
      width: 34px; height: 34px;
      background: transparent; border: 0;
      color: rgba(255,255,255,.6);
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s;
    }
    .course-sidebar-close:hover { background: rgba(255,255,255,.1); color: #fff; }
    .course-sidebar .back-link {
      color: rgba(255,255,255,.72);
      font-size: 13px;
      display: inline-flex; align-items: center; gap: 6px;
      margin-bottom: 24px;
    }
    .course-sidebar .back-link:hover { color: #fff; }
    .course-sidebar .eyebrow {
      font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
      color: rgba(255,255,255,.55); font-weight: 700;
      margin-bottom: 10px;
    }
    .course-sidebar .course-title {
      font-size: 22px; line-height: 1.2; font-weight: 700;
      color: #fff; margin: 0 0 18px; letter-spacing: -0.01em;
    }
    .course-sidebar .pct-row {
      display: flex; align-items: center; gap: 10px;
      font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
      color: rgba(255,255,255,.7); font-weight: 700;
      margin: 0 0 10px;
    }
    .course-sidebar .pct-track {
      height: 4px; border-radius: 999px;
      background: rgba(255,255,255,.14);
      overflow: hidden;
      margin-bottom: 22px;
    }
    .course-sidebar .pct-fill {
      height: 100%; width: 0%;
      background: var(--accent-lime);
      transition: width .3s ease;
    }

    /* Numbered section list with vertical track */
    .sections {
      list-style: none; padding: 0; margin: 0;
      position: relative;
    }
    .sections::before {
      content: "";
      position: absolute;
      left: 11px; top: 8px; bottom: 8px;
      width: 2px; background: rgba(255,255,255,.14);
    }
    .sections li {
      position: relative;
      padding: 10px 12px 10px 38px;
      border-radius: 10px;
      cursor: pointer;
      color: rgba(255,255,255,.78);
      font-size: 14px; line-height: 1.4;
      transition: background .15s, color .15s;
    }
    .sections li:hover { background: rgba(255,255,255,.06); color: #fff; }
    .sections li .dot {
      position: absolute;
      left: 4px; top: 13px;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--brand-900);
      border: 2px solid rgba(255,255,255,.35);
      box-sizing: border-box;
      transition: border-color .2s, background .2s, box-shadow .2s;
    }
    .sections li.done .dot {
      background: var(--accent-lime);
      border-color: var(--accent-lime);
    }
    .sections li.current {
      background: rgba(255,255,255,.08);
      color: #fff;
    }
    .sections li.current .dot {
      border-color: var(--accent-lime);
      box-shadow: 0 0 0 4px var(--accent-lime-soft);
    }
    .sections li .status {
      display: block;
      font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
      color: rgba(255,255,255,.45); margin-top: 2px; font-weight: 600;
    }
    .sections li.done .status    { color: var(--accent-lime); }
    .sections li.current .status { color: rgba(255,255,255,.85); }

    /* Main reading column — full-bleed, newspaper feel.
       Prose stays comfortable at ~780px; embed-heavy sections break out wider. */
    .course-main {
      padding: 0;
      max-width: none;
      width: 100%;
      margin: 0;
    }
    .course-main .section-wrap {
      max-width: 780px;
      margin-left: auto;
      margin-right: auto;
      padding-left: 40px;
      padding-right: 40px;
    }
    .course-main .section-wrap.has-embed {
      max-width: 1080px;
    }
    @supports selector(:has(*)) {
      .course-main .section-wrap:has(.block.embed) { max-width: 1080px; }
    }
    /* Full-viewport immersive hero with backdrop image. */
    .course-main .course-hero {
      position: relative;
      max-width: none;
      width: 100%;
      margin: 0;
      padding: 64px 40px 96px;
      min-height: calc(100vh - var(--header-h));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fff;
      overflow: hidden;
      border-bottom: 0;
      background:
        linear-gradient(180deg, rgba(5,13,26,.28) 0%, rgba(5,13,26,.78) 100%),
        url("https://transportmedia.be/wp-content/uploads/2024/06/Qargo-Team-1.jpg") center/cover no-repeat;
    }
    .course-main .course-hero .hero-inner {
      max-width: 820px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }
    .course-main .course-hero .meta {
      font-size: 12px; letter-spacing: .2em; text-transform: uppercase;
      color: var(--brand-600); font-weight: 700;
      margin-bottom: 0;
      display: inline-block;
    }
    .course-main .course-hero .meta::before { display: none; }
    .course-main .course-hero h1 {
      font-size: 72px; line-height: 1.02; margin: 0;
      letter-spacing: -0.028em; font-weight: 800;
      color: #fff;
      text-shadow: 0 2px 24px rgba(0,0,0,.22);
    }
    .course-main .course-hero p {
      color: rgba(255,255,255,.92);
      font-size: 20px; line-height: 1.5;
      max-width: 620px; margin: 0;
      text-shadow: 0 1px 10px rgba(0,0,0,.2);
    }
    .course-main .course-hero .hero-start {
      position: absolute;
      bottom: 56px; left: 50%;
      transform: translateX(-50%);
      display: inline-flex; align-items: center; gap: 12px;
      background: var(--brand-600);
      color: var(--brand-900);
      padding: 16px 32px;
      border: 0; border-radius: 999px;
      font: inherit; font-weight: 700;
      font-size: 13px; letter-spacing: .16em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 14px 36px rgba(0,232,91,.38), 0 4px 16px rgba(5,13,26,.3);
      transition: transform .15s, box-shadow .15s, background .15s;
    }
    .course-main .course-hero .hero-start:hover {
      background: var(--brand-500);
      transform: translateX(-50%) translateY(-2px);
      box-shadow: 0 20px 44px rgba(0,232,91,.45), 0 6px 20px rgba(5,13,26,.35);
    }
    .course-main .course-hero .hero-start:active {
      transform: translateX(-50%) translateY(0);
    }
    .course-main .course-hero .hero-start svg {
      animation: hero-bob 1.8s ease-in-out infinite;
    }
    @keyframes hero-bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(3px); }
    }

    .section-wrap {
      scroll-margin-top: calc(var(--header-h) + 16px);
    }
    .course-main .section-wrap {
      padding-top: 96px;
      padding-bottom: 96px;
    }
    .course-main .section-wrap .section-label {
      font-size: 12px; letter-spacing: .18em; text-transform: uppercase;
      color: var(--brand-600); font-weight: 700;
      margin-bottom: 14px;
      display: inline-block;
    }
    .course-main .section-wrap .section-label::before { display: none; }
    .course-main .section-wrap h2.section-title {
      margin: 0 0 48px;
      font-size: 52px; line-height: 1.05;
      color: var(--brand-900); font-weight: 800;
      letter-spacing: -0.025em;
    }

    /* Frameless article-style block inside course view.
       Specific interactive block types (summary, embed, quiz, accordion,
       flashcards, match) bring their own visual containment, so removing the
       outer card chrome doesn't make them look unstyled. */
    .course-main .block > .kind { display: none; }
    .course-main .block {
      background: transparent;
      border: 0;
      border-radius: 0;
      padding: 0;
      margin: 56px 0;
      box-shadow: none;
    }
    .course-main .block h3 {
      font-size: 32px;
      line-height: 1.15;
      margin: 0 0 20px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .course-main .block .prose {
      font-size: 18px;
      line-height: 1.75;
      color: var(--ink-700);
    }
    .course-main .block .prose .lead-p {
      font-size: 22px;
      line-height: 1.5;
      font-weight: 500;
      margin: 0 0 20px;
      color: var(--brand-900);
    }
    .course-main .block .prose p { margin: 18px 0; }

    /* Re-add chrome for summary block (needs the gradient card) */
    .course-main .block.summary-block {
      padding: 36px 40px;
      border: 1px solid var(--brand-600);
      border-radius: 18px;
      margin: 80px 0 64px;
      background: linear-gradient(180deg, var(--brand-50), var(--surface));
    }
    /* Accordion block: keep generous spacing but no outer shell */
    .course-main .block.accordion-block { margin: 56px 0; }
    /* Embed / quiz / match / flash: live happily without the outer card */

    /* Full-width lesson-transition banner that bleeds past the prose column
       and acts as a scroll gate — next lesson is hidden until the button is
       clicked, so the natural end of one lesson's content IS this banner. */
    .lesson-transition {
      width: 100%;
      padding: 72px 24px;
      background: #E4E9EF;
      border-top: 1px solid #CED5DD;
      border-bottom: 1px solid #CED5DD;
      opacity: 0;
      transform: translateY(32px);
      transition:
        opacity .7s cubic-bezier(.22,1,.36,1),
        transform .7s cubic-bezier(.22,1,.36,1);
    }
    .lesson-transition.in-view {
      opacity: 1;
      transform: translateY(0);
    }
    .lesson-transition button {
      display: block;
      max-width: 780px;
      margin: 0 auto;
      width: 100%;
      text-align: center;
      color: var(--ink-900);
      background: transparent;
      border: 0;
      padding: 0;
      font: inherit;
      font-size: 15px; font-weight: 800;
      letter-spacing: .16em; text-transform: uppercase;
      cursor: pointer;
      transition: transform .15s;
    }
    .lesson-transition button:hover { transform: translateY(-2px); }
    .lesson-transition .arrow {
      display: inline-flex; vertical-align: middle;
      margin-right: 16px; color: var(--brand-600);
    }
    .lesson-transition .next-title {
      vertical-align: middle;
      color: var(--brand-600);
    }
    .lesson-transition.is-last {
      background: var(--brand-900);
      border: 0;
      padding: 80px 24px;
    }
    .lesson-transition.is-last .next-title {
      color: var(--brand-600);
    }
    .lesson-transition.is-last .arrow { color: var(--brand-600); }

    /* Progressive reveal — lessons beyond the current one stay hidden so the
       learner has to click the lesson-transition button to advance. */
    .section-wrap.is-locked,
    .lesson-transition.is-locked {
      display: none;
    }
    /* Animate a freshly revealed section fading + sliding in. */
    @keyframes lesson-reveal {
      from { opacity: 0; transform: translateY(48px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .section-wrap.just-revealed {
      animation: lesson-reveal .8s cubic-bezier(.22,1,.36,1) forwards;
    }

    /* Floating current-lesson pin — replaces the always-visible sidebar.
       Click to open the collapsible table of contents. */
    .course-pin {
      position: fixed;
      left: 24px; bottom: 24px;
      display: flex; align-items: center; gap: 14px;
      background: var(--brand-900);
      color: #fff;
      padding: 14px 18px;
      border-radius: 14px;
      border: 0;
      text-align: left; cursor: pointer;
      max-width: min(360px, 68vw);
      z-index: 46;
      font: inherit;
      box-shadow: 0 18px 40px rgba(5,13,26,.3);
      transition: transform .15s, box-shadow .15s;
    }
    .course-pin:hover {
      transform: translateY(-2px);
      box-shadow: 0 24px 48px rgba(5,13,26,.36);
    }
    .course-pin .pin-text { flex: 1; min-width: 0; }
    .course-pin .pin-eyebrow {
      font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
      color: var(--brand-600); font-weight: 700;
      margin-bottom: 3px;
    }
    .course-pin .pin-title {
      font-size: 14px; font-weight: 700; line-height: 1.3;
      color: #fff;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .course-pin .pin-chev {
      flex: none;
      color: rgba(255,255,255,.55);
      transition: color .15s;
    }
    .course-pin:hover .pin-chev { color: #fff; }
    .course-pin[aria-expanded="true"] { opacity: 0; pointer-events: none; }

    /* Legacy .lesson-end (no longer rendered) — kept hidden as a safety net */
    .lesson-end { display: none; }

    /* Prev/Next navigation at the end of the course */
    .course-nav {
      display: flex; justify-content: space-between; gap: 12px;
      margin-top: 36px; padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .course-nav a, .course-nav button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--ink-900);
      padding: 12px 18px; border-radius: 12px;
      font: inherit; font-weight: 600; cursor: pointer;
      text-decoration: none;
    }
    .course-nav a:hover, .course-nav button:hover {
      border-color: var(--brand-600); color: var(--brand-700);
    }

    @media (max-width: 900px) {
      .course-sidebar { width: 86vw; max-width: 340px; padding: 56px 20px 32px; }
      .sections li { padding: 8px 10px 8px 34px; }
      .course-main .section-wrap { padding-left: 22px; padding-right: 22px; }
      .course-main .course-hero { padding: 48px 22px 104px; }
      .course-main .course-hero h1 { font-size: 40px; }
      .course-main .course-hero p { font-size: 17px; }
      .course-main .course-hero .hero-start { bottom: 28px; padding: 13px 22px; font-size: 12px; }
      .course-main .section-wrap { padding-top: 64px; padding-bottom: 64px; }
      .course-main .section-wrap h2.section-title { font-size: 32px; margin-bottom: 32px; }
      .course-main .block h3 { font-size: 24px; }
      .course-main .block .prose { font-size: 16px; line-height: 1.7; }
      .course-main .block .prose .lead-p { font-size: 19px; }
      .course-main .block.summary-block { padding: 24px; }
      .lesson-transition { padding: 32px 20px; }
      .course-pin { left: 16px; bottom: 16px; max-width: calc(100vw - 32px); }
    }

    h1 {
      font-size: 34px; line-height: 1.15; margin: 0 0 8px;
      font-weight: 700; letter-spacing: -0.02em; color: var(--brand-900);
    }
    h2 { font-size: 22px; margin: 36px 0 14px; font-weight: 700; color: var(--brand-900); letter-spacing: -0.01em; }
    p.lead { color: var(--ink-500); margin: 0 0 28px; font-size: 16px; max-width: 640px; }

    /* Hero */
    .hero {
      margin: 0 0 28px;
      padding: 56px 56px 52px;
      border-radius: 24px;
      background:
        radial-gradient(900px 280px at 90% -30%, rgba(0,232,91,.14), transparent 60%),
        linear-gradient(180deg, #ffffff 0%, #f4f5f6 100%);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    .hero .eyebrow {
      display: inline-flex; align-items: center;
      font-size: 12px; text-transform: uppercase;
      letter-spacing: .14em; color: var(--brand-600); font-weight: 700;
      padding: 8px 16px; border-radius: 999px;
      background: var(--brand-900);
      margin-bottom: 22px;
    }
    .hero h1 {
      margin: 0 0 14px;
      font-size: 52px; line-height: 1.05;
      letter-spacing: -0.025em;
      font-weight: 800;
    }
    .hero p {
      color: var(--ink-700); font-size: 17px; max-width: 560px;
      margin: 0 0 28px;
    }
    .hero .cta-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .hero .btn {
      display: inline-flex; align-items: center; gap: 8px;
      font: inherit; font-size: 15px; font-weight: 700;
      padding: 14px 22px; border-radius: 14px;
      cursor: pointer; border: 1px solid transparent;
      text-decoration: none;
      transition: transform .05s, box-shadow .15s, background .15s, border-color .15s;
    }
    .hero .btn-primary {
      background: var(--brand-600);
      color: var(--brand-900);
      box-shadow: 0 8px 20px rgba(0,232,91,.32);
    }
    .hero .btn-primary:hover { background: var(--brand-500); text-decoration: none; }
    .hero .btn-primary:active { transform: translateY(1px); }
    .hero .btn-ghost {
      background: var(--surface);
      color: var(--brand-900);
      border-color: var(--border);
      box-shadow: var(--shadow-sm);
    }
    .hero .btn-ghost:hover { border-color: var(--brand-600); text-decoration: none; }

    /* Home hero (full-bleed, photo backdrop) — used only on the catalog page */
    .home-hero {
      position: relative;
      width: 100%;
      min-height: min(560px, 62vh);
      padding: 80px 32px 96px;
      display: flex; align-items: center;
      color: #fff;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(5,13,26,.38) 0%, rgba(5,13,26,.78) 100%),
        url("https://www.qargo.com/u/2025/07/Qargo-tms-1-1.avif") center/cover no-repeat;
    }
    .home-hero-inner {
      max-width: 1200px; margin: 0 auto; width: 100%;
    }
    .home-hero .eyebrow {
      display: inline-flex; align-items: center;
      font-size: 12px; text-transform: uppercase;
      letter-spacing: .14em; color: var(--brand-600); font-weight: 700;
      padding: 8px 16px; border-radius: 999px;
      background: rgba(5,13,26,.72);
      backdrop-filter: blur(6px);
      margin-bottom: 22px;
    }
    .home-hero h1 {
      margin: 0 0 14px;
      font-size: 60px; line-height: 1.02;
      letter-spacing: -0.025em;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 2px 24px rgba(0,0,0,.22);
      max-width: 780px;
    }
    .home-hero p {
      color: rgba(255,255,255,.92);
      font-size: 18px; line-height: 1.55;
      max-width: 620px;
      margin: 0 0 32px;
    }
    .home-hero .cta-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .home-hero .btn {
      display: inline-flex; align-items: center; gap: 8px;
      font: inherit; font-size: 15px; font-weight: 700;
      padding: 14px 24px; border-radius: 14px;
      cursor: pointer; border: 1px solid transparent;
      text-decoration: none;
      transition: transform .05s, box-shadow .15s, background .15s, border-color .15s, color .15s;
    }
    .home-hero .btn-primary {
      background: var(--brand-600);
      color: var(--brand-900);
      box-shadow: 0 10px 26px rgba(0,232,91,.38);
    }
    .home-hero .btn-primary:hover { background: var(--brand-500); text-decoration: none; }
    .home-hero .btn-primary:active { transform: translateY(1px); }
    .home-hero .btn-ghost {
      background: transparent;
      color: #fff;
      border-color: rgba(255,255,255,.6);
      box-shadow: none;
    }
    .home-hero .btn-ghost:hover {
      background: rgba(255,255,255,.12);
      border-color: #fff;
      text-decoration: none;
    }
    @media (max-width: 960px) {
      .home-hero { min-height: 440px; padding: 64px 28px 72px; }
      .home-hero h1 { font-size: 44px; }
      .home-hero p { font-size: 16px; }
    }
    @media (max-width: 640px) {
      .home-hero { min-height: 360px; padding: 48px 20px 56px; }
      .home-hero h1 { font-size: 34px; }
    }

    /* Stats cards */
    .stats {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px;
      margin-bottom: 40px;
    }
    .stat-card {
      display: flex; align-items: center; gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 22px;
      box-shadow: var(--shadow-sm);
    }
    .stat-card .icon {
      width: 52px; height: 52px; border-radius: 12px;
      background: var(--brand-50);
      color: var(--brand-600);
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .stat-card .icon svg { width: 24px; height: 24px; }
    .stat-card .num {
      font-size: 30px; font-weight: 800; color: var(--brand-900);
      line-height: 1; letter-spacing: -0.02em;
    }
    .stat-card .label {
      margin-top: 4px; font-size: 14px; color: var(--ink-500);
      font-weight: 500;
    }
    @media (max-width: 860px) {
      .stats { grid-template-columns: 1fr; }
    }

    /* Section header (title + subtitle + view all) */
    .section-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      gap: 16px; margin: 8px 0 18px;
    }
    .section-header .title { font-size: 26px; font-weight: 800; color: var(--brand-900); margin: 0 0 4px; letter-spacing: -0.02em; }
    .section-header .sub { font-size: 14px; color: var(--ink-500); margin: 0; }
    .section-header .sub .role-accent { color: var(--brand-600); font-weight: 700; }
    .section-header .view-all {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 8px 14px; border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      font: inherit; font-size: 13px; font-weight: 600;
      color: var(--brand-900);
      text-decoration: none;
      box-shadow: var(--shadow-sm);
    }
    .section-header .view-all:hover { border-color: var(--brand-600); text-decoration: none; }

    /* Continue Learning */
    .continue-card {
      display: flex; align-items: center; gap: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 24px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 20px;
    }
    .continue-card .icon {
      width: 52px; height: 52px; border-radius: 12px;
      background: var(--brand-50); color: var(--brand-600);
      display: grid; place-items: center; flex-shrink: 0;
    }
    .continue-card .icon svg { width: 24px; height: 24px; }
    .continue-card .body { flex: 1; min-width: 0; }
    .continue-card .t { font-size: 17px; font-weight: 700; color: var(--brand-900); margin: 0 0 2px; }
    .continue-card .d { font-size: 13px; color: var(--ink-500); margin: 0 0 10px; }
    .continue-card .bar-row { display: flex; align-items: center; gap: 12px; }
    .continue-card .bar {
      flex: 1; height: 8px; background: var(--ink-100);
      border-radius: 999px; overflow: hidden; max-width: 420px;
    }
    .continue-card .bar > span {
      display: block; height: 100%; background: var(--brand-600);
    }
    .continue-card .pct { font-size: 13px; font-weight: 700; color: var(--brand-900); }
    .continue-card .resume {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--brand-900); color: var(--brand-600);
      border: 0; border-radius: 12px;
      padding: 12px 20px; font: inherit; font-weight: 700; font-size: 14px;
      cursor: pointer; text-decoration: none;
    }
    .continue-card .resume:hover { background: var(--brand-800); text-decoration: none; }

    /* Home layout: main column (hero, path, grids) + side block (stats, leaderboard) */
    .home-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 32px;
      align-items: start;
    }
    .home-main { min-width: 0; }
    .home-side {
      display: flex; flex-direction: column; gap: 18px;
      position: sticky; top: calc(var(--header-h) + 24px);
    }
    @media (max-width: 1080px) {
      .home-layout { grid-template-columns: 1fr; }
      .home-side { position: static; }
    }

    .side-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .side-block-head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
      width: 100%;
      padding: 12px 16px;
      background: transparent;
      border: 0; cursor: pointer;
      font: inherit; text-align: left;
      color: var(--brand-900);
    }
    .side-block-head:hover { background: var(--ink-50); }
    .side-title {
      margin: 0; font-size: 13px; font-weight: 700; color: var(--brand-900);
      letter-spacing: -0.005em;
    }
    .side-block-chev {
      width: 18px; height: 18px; color: var(--ink-500);
      transition: transform .2s ease;
      flex-shrink: 0;
    }
    .side-block[data-collapsed="true"] .side-block-chev { transform: rotate(-90deg); }
    .side-block-body {
      padding: 4px 16px 16px;
      max-height: 800px;
      transition: max-height .25s ease, padding .2s ease, opacity .2s ease;
      overflow: hidden;
    }
    .side-block[data-collapsed="true"] .side-block-body {
      max-height: 0; padding-top: 0; padding-bottom: 0; opacity: 0;
    }
    .side-sub { margin: 0 0 10px; font-size: 12px; color: var(--ink-500); }

    /* Compact learner-progress: inline row of three mini-stats */
    .side-stats {
      list-style: none; padding: 0; margin: 0;
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .side-stats li {
      display: flex; flex-direction: column;
      gap: 4px;
      padding: 10px 8px;
      border-radius: 10px;
      background: var(--ink-50);
      text-align: center;
    }
    .side-stats .num {
      font-size: 20px; font-weight: 800; color: var(--brand-900);
      line-height: 1; letter-spacing: -0.02em;
    }
    .side-stats .label {
      font-size: 11px; color: var(--ink-500);
      line-height: 1.25;
    }

    .leaderboard { list-style: none; padding: 0; margin: 4px 0 0; display: flex; flex-direction: column; gap: 0; }
    .leaderboard li {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 8px; border-radius: 8px;
      font-size: 12.5px;
    }
    .leaderboard li .rank {
      width: 22px; text-align: center; font-weight: 800; color: var(--ink-500); font-size: 12px;
    }
    .leaderboard li:nth-child(1) .rank { color: var(--brand-600); }
    .leaderboard li .who { display: flex; flex-direction: column; flex: 1; min-width: 0; }
    .leaderboard li .nm {
      font-weight: 600; color: var(--brand-900);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .leaderboard li .co {
      font-size: 11.5px; color: var(--ink-500);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .leaderboard li .pts { font-weight: 700; color: var(--brand-900); font-size: 12.5px; }
    .leaderboard li.is-you { background: var(--brand-50); }
    .leaderboard li.is-you .nm { color: var(--brand-900); }
    .you-chip {
      display: inline-block; margin-left: 6px;
      background: var(--brand-600); color: var(--brand-900);
      font-size: 10px; font-weight: 800; letter-spacing: .06em;
      padding: 2px 6px; border-radius: 999px; text-transform: uppercase;
    }

    /* Learning path card */
    .path-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 28px 24px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 24px;
    }
    .path-card-head { margin-bottom: 18px; }
    .path-meta {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      font-size: 13px; color: var(--ink-500); margin-bottom: 8px;
    }
    .path-code {
      font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
      font-weight: 800; color: var(--brand-600);
    }
    .path-card h3 {
      margin: 0 0 6px; font-size: 24px; font-weight: 800; color: var(--brand-900);
      letter-spacing: -0.02em;
    }
    .path-card > .path-card-head p { margin: 0; color: var(--ink-500); font-size: 14.5px; }

    .path-module-list {
      list-style: none; padding: 0; margin: 0 0 18px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .path-step {
      display: grid;
      grid-template-columns: 52px 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface-2);
    }
    .path-step .step-code {
      font-size: 12px; font-weight: 800; color: var(--brand-900);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 4px 0; text-align: center;
      letter-spacing: .04em;
    }
    .path-step .step-title { font-size: 14.5px; font-weight: 600; color: var(--brand-900); }
    .path-step .step-status { font-size: 12px; color: var(--ink-500); font-weight: 600; }
    .path-step--active {
      border-color: var(--brand-600);
      background: var(--brand-50);
    }
    .path-step--active .step-status { color: var(--brand-600); }
    .path-step--done .step-code {
      background: var(--brand-600); color: var(--brand-900); border-color: var(--brand-600);
    }
    .path-step--done .step-status { color: var(--good); }
    .path-step--locked { opacity: .65; }
    .path-step--locked .step-status { color: var(--ink-300); }

    .path-card-foot {
      display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
      border-top: 1px solid var(--border); padding-top: 18px;
    }
    .path-progress { flex: 1; min-width: 200px; }
    .path-progress .bar {
      height: 8px; background: var(--surface-2); border-radius: 999px; overflow: hidden;
      border: 1px solid var(--border);
    }
    .path-progress .bar > span {
      display: block; height: 100%; background: var(--brand-600);
      transition: width .3s ease;
    }
    .path-progress .pct { font-size: 12.5px; font-weight: 700; color: var(--ink-500); margin-top: 6px; }
    .path-card-foot .btn-primary {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--brand-600); color: var(--brand-900);
      padding: 12px 22px; border-radius: 12px; border: 0;
      font: inherit; font-weight: 700; font-size: 14px;
      text-decoration: none;
      box-shadow: 0 6px 16px rgba(0,232,91,.22);
    }
    .path-card-foot .btn-primary:hover { background: var(--brand-500); text-decoration: none; }

    /* Locked cards (specialised / extra-curricular) */
    .card-locked {
      cursor: not-allowed;
      background: var(--surface);
      border-style: dashed;
      opacity: .78;
    }
    .card-locked:hover {
      transform: none;
      box-shadow: var(--shadow-sm);
      border-color: var(--border);
    }
    .card-locked .locked-badge {
      display: inline-block; align-self: flex-start;
      font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      background: var(--surface-2); color: var(--ink-500);
      padding: 4px 10px; border-radius: 999px; margin-bottom: 14px;
    }
    .card-locked h3 { margin: 0 0 8px; }
    .card-locked p { margin: 0; }

    .locked-panel {
      margin-top: 24px;
      padding: 22px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow-sm);
    }
    .locked-panel strong { display: block; font-size: 15px; color: var(--brand-900); margin-bottom: 4px; }
    .locked-panel p { margin: 0 0 14px; color: var(--ink-500); font-size: 14px; }

    /* Catalog */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 44px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 26px 26px 22px;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
      display: flex; flex-direction: column;
      color: inherit;
      box-shadow: var(--shadow-sm);
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: var(--brand-600);
      text-decoration: none;
    }
    .card .icon-tile {
      width: 52px; height: 52px; border-radius: 12px;
      background: var(--brand-50);
      color: var(--brand-600);
      display: grid; place-items: center;
      margin-bottom: 20px;
      font-size: 24px;
    }
    .card .icon-tile svg { width: 26px; height: 26px; }
    .card h3 {
      margin: 0 0 8px; font-size: 19px; color: var(--brand-900);
      font-weight: 700; letter-spacing: -0.01em;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .card p {
      margin: 0; color: var(--ink-500); font-size: 14px;
      line-height: 1.5;
    }
    .card .meta {
      margin: 20px 0 18px; font-size: 13px; color: var(--ink-500);
      display: flex; gap: 14px; align-items: center; justify-content: space-between;
    }
    .card .meta .dot-sep { color: var(--ink-300); }
    .card .start-btn {
      margin-top: auto;
      display: block; width: 100%;
      text-align: center;
      background: var(--brand-600);
      color: var(--brand-900);
      padding: 13px 18px; border-radius: 12px;
      font: inherit; font-weight: 700; font-size: 14px;
      border: 0; cursor: pointer;
      text-decoration: none;
      box-shadow: 0 6px 16px rgba(0,232,91,.22);
      transition: background .15s, transform .05s;
    }
    .card .start-btn:hover { background: var(--brand-500); text-decoration: none; }
    .card .start-btn:active { transform: translateY(1px); }

    /* Block cards */
    .block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 26px;
      margin: 16px 0;
      box-shadow: var(--shadow-sm);
    }
    .block .kind {
      display: inline-block;
      font-size: 11px; text-transform: uppercase; letter-spacing: .12em;
      padding: 4px 10px; border-radius: 999px;
      background: var(--brand-50); color: var(--brand-700); font-weight: 700;
      margin-bottom: 14px;
    }
    .block h3 { margin: 0 0 12px; font-size: 19px; color: var(--brand-900); font-weight: 700; }
    .block .prose { color: var(--ink-700); font-size: 15px; }
    .block .prose p { margin: 6px 0; }
    .block .prose .lead-p {
      font-size: 17px;
      color: var(--brand-900);
      font-weight: 500;
      margin: 0 0 12px;
      line-height: 1.5;
    }

    /* Accordion */
    .accordion-block .hint {
      font-size: 14px; color: var(--ink-500); margin: -4px 0 12px;
    }
    .accordion {
      display: grid; gap: 8px; margin-top: 4px;
    }
    .acc-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color .15s, box-shadow .15s;
    }
    .acc-row.open {
      border-color: var(--brand-600);
      box-shadow: 0 0 0 3px var(--brand-50);
    }
    .acc-head {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%;
      background: transparent;
      border: 0;
      padding: 14px 16px;
      font: inherit; font-weight: 600;
      color: var(--brand-900);
      text-align: left;
      cursor: pointer;
      gap: 12px;
    }
    .acc-head:hover { background: var(--brand-50); }
    .acc-q { flex: 1; }
    .acc-chev {
      flex: none;
      color: var(--brand-700);
      transition: transform .2s;
    }
    .acc-row.open .acc-chev { transform: rotate(180deg); }
    .acc-body {
      padding: 0 16px 14px;
      color: var(--ink-700);
      font-size: 15px;
      border-top: 1px solid var(--border);
    }
    .acc-body p { margin: 10px 0 0; }

    /* Summary */
    .summary-block {
      background: linear-gradient(180deg, var(--brand-50), var(--surface));
      border-color: var(--brand-600);
    }
    .summary-block .kind {
      background: var(--brand-900);
      color: var(--brand-600);
    }
    .summary-points {
      margin: 8px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }
    .summary-points li {
      position: relative;
      padding: 8px 12px 8px 34px;
      color: var(--ink-900);
      font-size: 15px;
      line-height: 1.5;
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .summary-points li::before {
      content: "";
      position: absolute;
      left: 12px; top: 14px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--brand-600);
      box-shadow: inset 0 0 0 3px var(--brand-900);
    }

    /* Lesson end */
    .lesson-end {
      display: flex; justify-content: flex-end;
      margin: 8px 0 4px;
    }
    .lesson-continue {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--brand-600);
      color: var(--brand-900);
      padding: 11px 18px;
      border-radius: 10px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: var(--shadow-sm);
      transition: background .15s, transform .1s;
    }
    .lesson-continue:hover { background: var(--brand-500); text-decoration: none; }
    .lesson-continue:active { transform: translateY(1px); }
    .lesson-continue.ghost {
      background: var(--surface);
      color: var(--brand-900);
      border: 1px solid var(--border);
    }
    .lesson-continue.ghost:hover { background: var(--brand-50); }

    /* Embed (iframes — Storylane demos, virtual environments, etc.) */
    .embed .frame {
      position: relative;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--brand-50);
      margin-top: 14px;
    }
    .embed .frame iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: 0; display: block;
    }
    .embed .caption { margin-top: 10px; font-size: 13px; color: var(--ink-500); }
    .embed .done-row {
      display: flex; gap: 10px; align-items: center;
      margin-top: 14px; flex-wrap: wrap;
    }
    .embed .done-btn {
      background: var(--brand-600); color: var(--brand-900);
      border: 0; border-radius: 10px;
      padding: 10px 16px; font: inherit; font-weight: 700;
      cursor: pointer;
    }
    .embed .done-btn:hover { background: var(--brand-500); }
    .embed .done-btn:disabled { background: var(--good); color: #fff; cursor: default; }
    .embed .open-new {
      font-size: 13px; color: var(--brand-700); text-decoration: none;
      border-bottom: 1px dashed var(--brand-600);
    }

    /* Quiz */
    .quiz .quiz-question { font-size: 17px; color: var(--ink-900); margin: 0 0 16px; }
    .quiz .options {
      display: flex; flex-direction: column; gap: 10px;
      margin: 0; padding: 0; border: 0;
    }
    .quiz .opt {
      display: flex; align-items: center; gap: 14px;
      text-align: left;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--ink-900);
      padding: 14px 18px;
      border-radius: 12px;
      cursor: pointer;
      font: inherit; font-weight: 500;
      transition: border-color .15s, background .15s, box-shadow .15s;
    }
    .quiz .opt input[type="radio"] {
      position: absolute;
      width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0);
      white-space: nowrap; border: 0;
    }
    .quiz .opt .radio-dot {
      width: 20px; height: 20px; flex-shrink: 0;
      border-radius: 999px;
      border: 2px solid var(--ink-300, #c9d0d8);
      background: var(--surface);
      position: relative;
      transition: border-color .15s, background .15s;
    }
    .quiz .opt .radio-dot::after {
      content: "";
      position: absolute; inset: 3px;
      border-radius: 999px;
      background: var(--brand-600);
      transform: scale(0);
      transition: transform .15s ease;
    }
    .quiz .opt .opt-text { flex: 1; min-width: 0; line-height: 1.45; }
    .quiz .opt:hover:not(.locked) {
      border-color: var(--brand-600);
      background: var(--brand-50);
    }
    .quiz .opt:hover:not(.locked) .radio-dot { border-color: var(--brand-600); }
    .quiz .opt.selected {
      border-color: var(--brand-600);
      background: var(--brand-50);
      box-shadow: 0 0 0 3px rgba(0,232,91,.12);
    }
    .quiz .opt.selected .radio-dot { border-color: var(--brand-600); }
    .quiz .opt.selected .radio-dot::after { transform: scale(1); }
    .quiz .opt.locked { cursor: default; }
    .quiz .opt.correct {
      border-color: var(--good); background: rgba(16,185,129,.08);
      box-shadow: none;
    }
    .quiz .opt.correct .radio-dot { border-color: var(--good); }
    .quiz .opt.correct .radio-dot::after { background: var(--good); transform: scale(1); }
    .quiz .opt.wrong {
      border-color: var(--bad); background: rgba(224,77,77,.08);
      box-shadow: none;
    }
    .quiz .opt.wrong .radio-dot { border-color: var(--bad); }
    .quiz .opt.wrong .radio-dot::after { background: var(--bad); transform: scale(1); }
    .quiz .quiz-actions { margin-top: 18px; }
    .quiz .submit-btn {
      display: inline-flex; align-items: center; gap: 8px;
      font: inherit; font-size: 14px; font-weight: 700;
      background: var(--brand-600); color: var(--brand-900);
      border: 0; border-radius: 12px;
      padding: 12px 22px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,232,91,.28);
      transition: background .15s, transform .05s, box-shadow .15s, opacity .15s;
    }
    .quiz .submit-btn:hover:not(:disabled) { background: var(--brand-500); }
    .quiz .submit-btn:active:not(:disabled) { transform: translateY(1px); }
    .quiz .submit-btn:disabled {
      background: var(--ink-100, #e8ecf0);
      color: var(--ink-500);
      box-shadow: none;
      cursor: not-allowed;
      opacity: 0.7;
    }
    .quiz .feedback { margin-top: 14px; font-size: 15px; color: var(--ink-500); }
    .quiz .feedback.good { color: var(--good); }
    .quiz .feedback.bad  { color: var(--bad); }

    /* Flashcards */
    .flash { perspective: 1200px; }
    .flash .deck { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); margin-top: 14px; }
    .flash .card-flip {
      position: relative; height: 150px; cursor: pointer;
      transform-style: preserve-3d;
      transition: transform .5s;
    }
    .flash .card-flip.flipped { transform: rotateY(180deg); }
    .flash .face {
      position: absolute; inset: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      display: flex; align-items: center; justify-content: center;
      text-align: center; backface-visibility: hidden;
      box-shadow: var(--shadow-sm); font-weight: 500;
    }
    .flash .face.front { color: var(--brand-900); }
    .flash .back {
      transform: rotateY(180deg);
      background: var(--brand-900);
      color: var(--brand-600); border-color: transparent;
    }
    .flash .hint { font-size: 13px; color: var(--ink-500); margin-top: 4px; }

    /* Match */
    .match .lanes { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 14px; }
    .match h4 {
      margin: 0 0 10px; color: var(--ink-500);
      font-size: 12px; text-transform: uppercase; letter-spacing: .1em; font-weight: 700;
    }
    .match .pool, .match .targets { display: grid; gap: 10px; }
    .match .chip {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      cursor: grab; user-select: none;
      font-weight: 500; color: var(--brand-900);
      box-shadow: var(--shadow-sm);
    }
    .match .chip:active { cursor: grabbing; }
    .match .chip.dragging { opacity: .4; }
    .match .target {
      background: var(--surface-2);
      border: 1.5px dashed var(--ink-100);
      border-radius: 10px;
      padding: 11px 14px;
      min-height: 48px;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      transition: border-color .15s, background .15s;
    }
    .match .target.over    { border-color: var(--brand-600); background: var(--brand-50); }
    .match .target.correct { border-color: var(--good); border-style: solid; background: rgba(16,185,129,.05); }
    .match .target.wrong   { border-color: var(--bad);  border-style: solid; background: rgba(224,77,77,.05); }
    .match .target .label { color: var(--ink-700); font-size: 14px; }
    .match .target .drop-slot { min-width: 120px; text-align: right; }
    .match .actions { margin-top: 18px; display: flex; gap: 10px; }

    /* Buttons */
    button.primary {
      background: var(--brand-600);
      color: var(--brand-900); border: none;
      padding: 11px 18px; border-radius: 10px;
      cursor: pointer; font-weight: 700; font-size: 14px; font-family: inherit;
      transition: background .15s, transform .05s;
      box-shadow: 0 6px 14px rgba(0,232,91,.28);
    }
    button.primary:hover { background: var(--brand-500); }
    button.primary:active { transform: translateY(1px); }
    button.ghost {
      background: transparent; color: var(--brand-700);
      border: 1.5px solid var(--border);
      padding: 11px 18px; border-radius: 10px;
      cursor: pointer; font-weight: 600; font-size: 14px; font-family: inherit;
      transition: border-color .15s, background .15s;
    }
    button.ghost:hover { border-color: var(--brand-600); background: var(--brand-50); }

    /* Progress */
    .progress {
      height: 6px; background: var(--ink-100); border-radius: 999px; overflow: hidden;
      margin: 10px 0 28px;
    }
    .progress > span {
      display: block; height: 100%;
      background: var(--brand-600);
      transition: width .3s;
    }

    .back-link { color: var(--ink-500); font-size: 14px; }
    .back-link:hover { color: var(--brand-900); }

    /* Identity modal */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(11,37,69,.45);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 32px;
      width: min(440px, 92vw);
      box-shadow: var(--shadow-lg);
    }
    .modal .mark-lg {
      width: 52px; height: 52px; border-radius: 14px;
      display: grid; place-items: center;
      margin-bottom: 18px;
    }
    .modal .mark-lg img {
      width: 52px; height: 52px; object-fit: contain; display: block;
    }
    .modal h2 { margin: 0 0 6px; font-size: 22px; color: var(--brand-900); font-weight: 700; }
    .modal p.lead { margin: 0 0 22px; font-size: 14px; color: var(--ink-500); max-width: none; }
    .modal label { display: block; font-size: 13px; color: var(--ink-700); margin: 14px 0 6px; font-weight: 500; }
    .modal input {
      width: 100%; padding: 12px 14px;
      background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px;
      color: var(--ink-900); font: inherit; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .modal input:focus,
    .modal select:focus {
      border-color: var(--brand-600);
      box-shadow: 0 0 0 4px rgba(0,232,91,.22);
    }
    .modal select {
      width: 100%; padding: 12px 14px;
      background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px;
      color: var(--ink-900); font: inherit; outline: none;
      transition: border-color .15s, box-shadow .15s;
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8' fill='none'><path d='M1 1.5L6 6.5L11 1.5' stroke='%235A6B82' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/></svg>");
      background-repeat: no-repeat;
      background-position: right 14px center;
      padding-right: 40px;
    }
    .modal .role-hint {
      margin-top: 8px;
      font-size: 13px;
      color: var(--ink-500);
      min-height: 18px;
    }
    .modal .error { color: var(--bad); font-size: 13px; margin-top: 12px; min-height: 18px; }
    .modal .actions { margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px; }

    /* Group headings inside catalog */
    .group-label {
      display: flex; align-items: center; gap: 10px;
      margin: 32px 0 14px; color: var(--brand-900);
    }
    .group-label h2 { margin: 0; }
    .group-label .tag {
      font-size: 11px; text-transform: uppercase; letter-spacing: .12em;
      background: var(--brand-50); color: var(--brand-700);
      padding: 4px 10px; border-radius: 999px; font-weight: 700;
    }
    .group-label .tag.neutral { background: var(--surface-2); color: var(--ink-500); }

    /* Identity chip (header right) */
    .me {
      display: flex; align-items: center; gap: 12px;
      padding-left: 16px; border-left: 1px solid var(--border);
    }
    .me .who { text-align: right; line-height: 1.2; }
    .me .name { color: var(--brand-900); font-weight: 700; font-size: 14px; display: block; }
    .me .role { color: var(--ink-500); font-size: 12px; display: block; margin-top: 2px; }
    .me .avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--brand-900);
      color: var(--brand-600);
      display: grid; place-items: center;
      font-weight: 700; font-size: 13px;
      letter-spacing: .03em;
      border: 2px solid var(--brand-600);
      cursor: pointer;
    }
    .me .avatar:hover { filter: brightness(1.08); }

    /* Completion pill */
    .card .done {
      color: var(--good); font-size: 11px; font-weight: 700;
      background: rgba(16,185,129,.1);
      padding: 3px 8px; border-radius: 999px;
      letter-spacing: .02em;
    }
    .card .star-pill {
      font-size: 11px; font-weight: 700; letter-spacing: .02em;
      background: var(--brand-900); color: var(--brand-600);
      padding: 3px 8px; border-radius: 999px;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: var(--brand-900); color: #fff;
      padding: 12px 20px; border-radius: 12px;
      font-size: 14px; font-weight: 500; z-index: 200;
      opacity: 0; transition: opacity .2s;
      pointer-events: none;
      box-shadow: var(--shadow-lg);
    }
    .toast.show { opacity: 1; }

    @media (max-width: 960px) {
      header .search { display: none; }
      .hero { padding: 40px 28px; }
      .hero h1 { font-size: 38px; }
    }
    @media (max-width: 640px) {
      main { padding: 24px 16px 60px; }
      .hero { padding: 28px 22px; }
      .hero h1 { font-size: 30px; }
      .hero p { font-size: 15px; }
      h1 { font-size: 28px; }
      .match .lanes { grid-template-columns: 1fr; }
      .me .who { display: none; }
      .continue-card { flex-wrap: wrap; }
      .continue-card .resume { margin-left: auto; }
    }
  </style>
</head>

  const MODULES = [
    {

              body: "Qargo is a Transport Management System built around how transport actually operates. Instead of forcing a workflow on you, it follows the chain your operation already runs: a customer requests a move, the move is broken into physical events at specific addresses, and those events are grouped into something a driver can execute. Knowing this chain before you open any screen is what makes the rest of the app click into place."

                { term: "Price per pallet",   definition: "Rate card" }

            {
              type: "summary",
              title: "Key takeaways",

  /* =========================================================================
     LEARNER IDENTITY + REPORTING
     No login — we ask for name/email/company once and stash in localStorage.
     A course is reported to Notion exactly once per browser (guarded by the
     "academy.completed" key) when progress hits 100%.
     ========================================================================= */
  const LS_LEARNER   = "academy.learner";
  const LS_COMPLETED = "academy.completed";
  const LS_PROGRESS  = "academy.progress"; // { [moduleId]: { lastLessonIdx, completedLessons: [lessonId...] } }

  /* Return a module's lessons. If a module still uses the flat `blocks` shape
     (legacy or placeholder), wrap each block as its own one-block lesson. */
  function lessonsOf(m) {
    if (Array.isArray(m.lessons) && m.lessons.length) return m.lessons;
    if (Array.isArray(m.blocks) && m.blocks.length) {
      return m.blocks.map((b, i) => ({
        id: `${m.id}-legacy-${i}`,
        title: b.title || `Lesson ${i + 1}`,
        blocks: [b],
      }));
    }
    return [];
  }
  function moduleLessonCount(m) { return lessonsOf(m).length; }
  function moduleBlockCount(m)  { return lessonsOf(m).reduce((n, l) => n + (l.blocks?.length || 0), 0); }

  function getProgressAll() {
    try { return JSON.parse(localStorage.getItem(LS_PROGRESS) || "{}"); }
    catch { return {}; }
  }
  function getModuleProgress(moduleId) {
    const all = getProgressAll();
    return all[moduleId] || { lastLessonId: null, completedLessons: [] };
  }
  function setModuleProgress(moduleId, progress) {
    const all = getProgressAll();
    all[moduleId] = progress;
    localStorage.setItem(LS_PROGRESS, JSON.stringify(all));
  }
  function markLessonDone(moduleId, lessonId) {
    const p = getModuleProgress(moduleId);
    if (!p.completedLessons.includes(lessonId)) p.completedLessons.push(lessonId);
    p.lastLessonId = lessonId;
    setModuleProgress(moduleId, p);
  }
  /* Path-level progress: % of unlocked-module lessons the learner has finished. */
  function getPathProgress() {
    const unlocked = MODULES.filter(m => !m.locked && moduleLessonCount(m) > 0);
    if (!unlocked.length) return { pct: 0, started: false, completedModules: 0, totalModules: MODULES.length };
    let totalLessons = 0, doneLessons = 0, startedAny = false, completedModules = 0;
    for (const m of unlocked) {
      const lessons = moduleLessonCount(m);
      const p = getModuleProgress(m.id);
      totalLessons += lessons;
      doneLessons += p.completedLessons.length;
      if (p.completedLessons.length > 0) startedAny = true;
      if (p.completedLessons.length >= lessons) completedModules++;
    }
    const pct = totalLessons ? Math.round((doneLessons / totalLessons) * 100) : 0;
    return { pct, started: startedAny, completedModules, totalModules: MODULES.length };
  }

  function getLearner() {
    try { return JSON.parse(localStorage.getItem(LS_LEARNER) || "null"); }
    catch { return null; }
  }
  function setLearner(l) { localStorage.setItem(LS_LEARNER, JSON.stringify(l)); renderMe(); }
  function switchProfile() {
    // Keep the existing learner pre-filled and let them change any field.
    showIdentityModal(() => route());
  }
  function roleLabel(id) {
    const r = ROLES.find(r => r.id === id);
    return r ? r.label : id;
  }
  function getCompleted() {
    try { return JSON.parse(localStorage.getItem(LS_COMPLETED) || "{}"); }
    catch { return {}; }
  }
  function markCompleted(courseId) {
    const all = getCompleted();
    if (all[courseId]) return false;
    all[courseId] = new Date().toISOString();
    localStorage.setItem(LS_COMPLETED, JSON.stringify(all));
    return true;
  }

      if (!/^\S+@\S+\.\S+$/.test(email)) { err.textContent = "Please enter a valid email."; return; }
      if (!role) { err.textContent = "Please pick your role."; return; }
      setLearner({ name, email, company, role });
      back.remove();
      if (onDone) onDone();
    };
    document.getElementById("id-save").addEventListener("click", submit);
    back.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
  }

  function toast(msg) {
    let t = document.querySelector(".toast");
    if (!t) { t = document.createElement("div"); t.className = "toast"; document.body.appendChild(t); }
    t.textContent = msg;
    requestAnimationFrame(() => t.classList.add("show"));
    clearTimeout(toast._t);
    toast._t = setTimeout(() => t.classList.remove("show"), 2500);
  }

  async function reportCompletion(course) {
    const learner = getLearner();
    if (!learner) return;
    if (!markCompleted(course.id)) return;     // already reported on this browser
    toast("Module completed");
    if (!REPORTING_ENDPOINT) return;           // offline / not configured
    try {
      await fetch(REPORTING_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          event: "course_completed",
          learner,
          role: learner.role || null,
          roleLabel: learner.role ? roleLabel(learner.role) : null,
          course: { id: course.id, title: course.title },
          completedAt: new Date().toISOString()
        })
      });
    } catch (e) { console.warn("reporting failed:", e); }
  }
